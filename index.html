<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Киношке</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- БОКОВАЯ ПАНЕЛЬ С ОЦЕНКАМИ -->
  <aside class="sidebar">
    <h3>🍿 Недавно смотрели</h3>
    <div id="recentList"></div>
  </aside>

  <!-- ОСНОВНАЯ ЗОНА -->
  <main class="content-area">
    <div class="header-zone">
      <h1 class="site-title">🍿 Киношке</h1>
      <div class="controls-group">
        <span id="statusIcon" class="status-icon" onclick="openTokenModal()">❌</span>
        <button class="btn-settings" onclick="openTokenModal()">⚙️</button>
      </div>
    </div>

    <!-- ФОРМА ДОБАВЛЕНИЯ -->
    <section class="add-panel">
      <div style="position:relative">
        <input id="searchInput" class="search-input" type="text" placeholder="Как называется фильм?" oninput="onSearchInput()">
        <div id="dropdown" class="dropdown hidden"></div>
      </div>
      
      <div id="configForm" class="config-form hidden" style="margin-top:15px">
        <div id="configTitle" style="font-weight:bold; margin-bottom:10px"></div>
        <div style="display:flex; gap:10px; margin-bottom:10px">
          <select id="selStatus" onchange="onStatusChange()" style="flex:1; padding:8px; background:#09070f; color:#fff; border:1px solid #2c224d; border-radius:8px">
            <option value="watchlist">Хочу посмотреть</option>
            <option value="watched">Просмотрено</option>
          </select>
          <select id="selCategory" class="watched-only hidden" style="flex:1; padding:8px; background:#09070f; color:#fff; border:1px solid #2c224d; border-radius:8px">
            <option value="joint">🍿 Наши</option>
            <option value="boy">👨 Бодяга</option>
            <option value="girl">👩 Каракумикуи</option>
          </select>
        </div>
        <div class="watched-only hidden" style="display:flex; gap:10px; margin-bottom:15px">
          <div style="flex:1">
            <label style="font-size:0.8rem; color:#9c94b0">👨: <span id="valBoy">5</span></label>
            <input type="range" id="sliBoy" min="1" max="10" value="5" style="width:100%" oninput="document.getElementById('valBoy').textContent=this.value">
          </div>
          <div style="flex:1">
            <label style="font-size:0.8rem; color:#9c94b0">👩: <span id="valGirl">5</span></label>
            <input type="range" id="sliGirl" min="1" max="10" value="5" style="width:100%" oninput="document.getElementById('valGirl').textContent=this.value">
          </div>
        </div>
        <button class="btn-primary" id="btnSave" onclick="saveMovie()">Добавить</button>
      </div>
    </section>

    <!-- ВКЛАДКИ -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab(this,'watchlist')">Хочу посмотреть</button>
      <button class="tab" onclick="switchTab(this,'watched')">Просмотрено</button>
    </div>
    
    <div id="subTabs" class="sub-tabs hidden" style="margin-bottom:20px; display:flex; gap:10px">
      <button class="sub-tab" onclick="switchSub(this,'all')" style="padding:5px 10px; background:#130f22; border:1px solid #2c224d; color:#fff; border-radius:6px; cursor:pointer">Все</button>
      <!-- Другие подвкладки добавятся скриптом -->
    </div>

    <div id="grid" class="grid"></div>
  </main>

  <!-- ОКНО ТОКЕНА -->
  <div id="tokenModal" class="modal-overlay hidden">
    <div class="modal-card">
      <h3 style="text-align:center">🔑 Настройка GitHub</h3>
      <input type="text" id="tokenInput" placeholder="ghp_..." style="width:100%; padding:10px; margin:15px 0; background:#09070f; border:1px solid #2c224d; color:#fff; border-radius:8px">
      <button class="btn-primary" onclick="saveTokenBtn()">Сохранить токен</button>
      <button onclick="closeTokenModal()" style="width:100%; margin-top:10px; background:none; border:none; color:#9c94b0; cursor:pointer">Закрыть</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
