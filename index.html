<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Киношке</title>
  <style>
    :root {
      --bg:         #09070f;
      --panel:      #130f22;
      --card:       #1a152e;
      --border:     #2c224d;
      --text:       #f1edf7;
      --muted:      #9c94b0;
      --accent:     #9d4edd;
      --accent-glow:rgba(157, 78, 221, 0.35);
      --accent2:    #f72585;
      --danger:     #ff5252;
      --success:    #2ecc71;
      --star:       #ffbe0b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 16px 80px;
    }

    .site-title {
      text-align: center;
      font-size: 2.6rem;
      font-weight: 800;
      margin-bottom: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .add-panel {
      background: linear-gradient(135deg, var(--panel), #17122b);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.45);
      position: relative;
    }

    .search-wrap { position: relative; }

    input[type="text"] {
      width: 100%;
      padding: 14px 18px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color .25s, box-shadow .25s;
    }
    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 14px var(--accent-glow);
    }

    .dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-height: 320px;
      overflow-y: auto;
      z-index: 200;
      box-shadow: 0 16px 40px rgba(0,0,0,0.65);
    }
    .dropdown-item {
      display: flex;
      gap: 14px;
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .15s;
    }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item:hover { background: rgba(157,78,221,.12); }
    .dropdown-item img { width: 42px; height: 62px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
    .dropdown-item h4 { font-size: .95rem; margin-bottom: 4px; }
    .dropdown-item p  { font-size: .82rem; color: var(--muted); }

    .config-form {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-top: 16px;
    }
    .config-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 16px; color: var(--text); }

    .row { display: flex; gap: 18px; margin-bottom: 14px; flex-wrap: wrap; }
    .field { flex: 1; min-width: 190px; }
    .field label { display: block; font-size: .85rem; color: var(--muted); margin-bottom: 7px; }

    select {
      width: 100%;
      padding: 11px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      outline: none;
      cursor: pointer;
    }

    .slider-row { display: flex; align-items: center; gap: 10px; }
    input[type="range"] { flex: 1; accent-color: var(--accent); }
    .score-val { font-weight: 700; color: var(--star); min-width: 32px; }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: linear-gradient(45deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s;
      margin-top: 4px;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-primary:disabled { opacity: .45; cursor: default; }

    .tabs {
      display: flex;
      gap: 6px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
      margin-bottom: 20px;
    }
    .tab {
      background: none;
      border: none;
      color: var(--muted);
      padding: 9px 22px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px 8px 0 0;
      transition: color .2s;
    }
    .tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); }

    .sub-tabs { display: flex; gap: 8px; margin-bottom: 22px; flex-wrap: wrap; }
    .sub-tab {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 7px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-size: .9rem;
      transition: border-color .2s, color .2s;
    }
    .sub-tab.active { border-color: var(--accent); color: var(--accent); }

    .grid { display: flex; flex-direction: column; gap: 18px; }

    .card {
      display: flex;
      gap: 18px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      transition: border-color .2s;
    }
    .card:hover { border-color: rgba(157,78,221,.4); }

    .card-poster {
      width: 95px;
      height: 142px;
      object-fit: cover;
      border-radius: 9px;
      flex-shrink: 0;
    }

    .card-body { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .card-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 3px; }
    .card-year  { color: var(--muted); font-size: .88rem; margin-bottom: 8px; }
    .card-desc  { color: var(--muted); font-size: .9rem; line-height: 1.45; margin-bottom: 12px;
                  display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 3; overflow: hidden; }

    .card-tags  { display: flex; gap: 8px; flex-wrap: wrap; }
    .tag { padding: 3px 10px; border-radius: 6px; font-size: .82rem; }
    .tag-viewer { background: rgba(255,255,255,.06); }
    .tag-score  { background: rgba(157,78,221,.12); color: var(--star); }

    .card-actions { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; justify-content: flex-start; }
    .btn-action {
      padding: 7px 14px; border: none; border-radius: 8px; font-size: .85rem;
      font-weight: 600; cursor: pointer; white-space: nowrap; transition: opacity .2s;
    }
    .btn-action:hover { opacity: .82; }
    .btn-watched  { background: var(--success); color: #fff; }
    .btn-edit     { background: rgba(157,78,221,.2); color: var(--accent); }
    .btn-delete   { background: rgba(255,82,82,.12); color: var(--danger); }

    .empty { text-align: center; padding: 50px 20px; color: var(--muted); font-style: italic; }
    .loading { text-align: center; padding: 40px; color: var(--muted); }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="wrap">

  <h1 class="site-title">🍿 Киношке</h1>

  <section class="add-panel">
    <div class="search-wrap">
      <input id="searchInput" type="text" placeholder="Как называется фильм?" autocomplete="off" oninput="onSearchInput()">
      <div id="dropdown" class="dropdown hidden"></div>
    </div>

    <div id="configForm" class="config-form hidden">
      <div id="configTitle" class="config-title"></div>

      <div class="row">
        <div class="field">
          <label>Куда добавить?</label>
          <select id="selStatus" onchange="onStatusChange()">
            <option value="watchlist">Хочу посмотреть</option>
            <option value="watched">Уже посмотрели</option>
          </select>
        </div>
        <div class="field watched-only hidden">
          <label>Кто смотрел?</label>
          <select id="selCategory" onchange="onCategoryChange()">
            <option value="joint">🍿 Наши</option>
            <option value="boy">👨 Бодяга</option>
            <option value="girl">👩 Каракумикуи</option>
          </select>
        </div>
      </div>

      <div class="row watched-only hidden">
        <div class="field" id="boyField">
          <label>Моя оценка: <span id="valBoy" class="score-val">5</span>/10</label>
          <div class="slider-row">
            <input type="range" id="sliBoy" min="1" max="10" value="5" oninput="document.getElementById('valBoy').textContent=this.value">
          </div>
        </div>
        <div class="field" id="girlField">
          <label>Оценка девушки: <span id="valGirl" class="score-val">5</span>/10</label>
          <div class="slider-row">
            <input type="range" id="sliGirl" min="1" max="10" value="5" oninput="document.getElementById('valGirl').textContent=this.value">
          </div>
        </div>
      </div>

      <button class="btn-primary" id="btnSave" onclick="saveMovie()">Добавить в коллекцию</button>
    </div>
  </section>

  <div class="tabs">
    <button class="tab active" onclick="switchTab(this,'watchlist')">Хочу посмотреть</button>
    <button class="tab"        onclick="switchTab(this,'watched')">Просмотрено</button>
  </div>

  <div id="subTabs" class="sub-tabs hidden">
    <button class="sub-tab active" onclick="switchSub(this,'all')">Все</button>
    <button class="sub-tab"        onclick="switchSub(this,'joint')">🍿 Наши</button>
    <button class="sub-tab"        onclick="switchSub(this,'boy')">👨 Бодяга</button>
    <button class="sub-tab"        onclick="switchSub(this,'girl')">👩 Каракумикуи</button>
  </div>

  <div id="grid" class="grid">
    <div class="loading">Загрузка...</div>
  </div>
</div>

<script>
  const TMDB_KEY = 'af2e801d23d9fad3c709a796331ac8f7';
  const LABELS   = { joint: '🍿 Наши', boy: '👨 Бодяга', girl: '👩 Каракумикуи' };

  // ── НАСТРОЙКИ GITHUB ──
  const GH_USER  = '057bodyaga'; 
  const GH_REPO  = 'cinema057';
  const GH_TOKEN = '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';

  let db          = [];   
  let activeTab   = 'watchlist';
  let activeSub   = 'all';
  let pending     = null; 
  let searchTimer = null;
  let fileSha     = null;

  async function apiGet() { 
    try {
      document.getElementById('grid').innerHTML = '<div class="loading">Синхронизация с GitHub...</div>';
      const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/movies.json`;
      const response = await fetch(url, {
        headers: { "Authorization": `token ${GH_TOKEN}`, "Accept": "application/vnd.github.v3+json" }
      });
      if (!response.ok) throw new Error();
      const data = await response.json();
      fileSha = data.sha;
      db = JSON.parse(b64DecodeUnicode(data.content));
      render();
    } catch (e) {
      document.getElementById('grid').innerHTML = '<div class="empty">Ошибка! Проверь логин GitHub в строке 160 кода.</div>';
    }
  }

  async function apiSave(movie) { 
    db = db.filter(m => m.id !== movie.id);
    db.push(movie);
    await commitToGitHub("Добавление фильма");
  }

  async function apiDelete(id) { 
    db = db.filter(m => m.id !== id);
    await commitToGitHub("Удаление фильма");
  }

  async function commitToGitHub(message) {
    const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/movies.json`;
    const base64Content = b64EncodeUnicode(JSON.stringify(db, null, 2));
    const payload = { message: message, content: base64Content, sha: fileSha };
    
    const res = await fetch(url, {
      method: 'PUT',
      headers: { "Authorization": `token ${GH_TOKEN}`, "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (res.ok) {
      const resData = await res.json();
      fileSha = resData.content.sha;
      render();
    } else {
      alert("Не удалось сохранить.");
    }
  }

  function b64EncodeUnicode(str) {
    return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (match, p1) => String.fromCharCode('0x' + p1)));
  }

  function b64DecodeUnicode(str) {
    return decodeURIComponent(atob(str.replace(/\s/g, '')).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
  }

  function onSearchInput() {
    clearTimeout(searchTimer);
    const q = document.getElementById('searchInput').value.trim();
    if (q.length < 2) { hideDropdown(); return; }
    searchTimer = setTimeout(() => fetchMovies(q), 350);
  }

  async function fetchMovies(q) {
    try {
      const url = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}&language=ru-RU`;
      const data = await (await fetch(url)).json();
      showDropdown(data.results?.slice(0, 6) ?? []);
    } catch { hideDropdown(); }
  }

  function showDropdown(results) {
    const dd = document.getElementById('dropdown');
    if (!results.length) { hideDropdown(); return; }
    dd.innerHTML = '';
    results.forEach(m => {
      const poster = m.poster_path ? `https://image.tmdb.org/t/p/w92${m.poster_path}` : 'https://placehold.co/42x62/1a152e/9c94b0?text=?';
      const item = document.createElement('div');
      item.className = 'dropdown-item';
      item.innerHTML = `<img src="${poster}"><div><h4>${esc(m.title)}</h4><p>${m.release_date?.substring(0,4) ?? '—'}</p></div>`;
      item.onclick = () => pickMovie(m);
      dd.appendChild(item);
    });
    dd.classList.remove('hidden');
  }

  function hideDropdown() { document.getElementById('dropdown').classList.add('hidden'); }

  function pickMovie(movie) {
    pending = movie;
    hideDropdown();
    document.getElementById('searchInput').value = movie.title;
    document.getElementById('configTitle').textContent = `Настройка: "${movie.title}"`;
    document.getElementById('selStatus').value   = 'watchlist';
    document.getElementById('sliBoy').value      = 5;
    document.getElementById('sliGirl').value     = 5;
    document.getElementById('valBoy').textContent  = '5';
    document.getElementById('valGirl').textContent = '5';
    document.getElementById('btnSave').textContent = 'Добавить в коллекцию';
    document.getElementById('configForm').classList.remove('hidden');
    onStatusChange();
  }

  function onStatusChange() {
    const isWatched = document.getElementById('selStatus').value === 'watched';
    document.querySelectorAll('.watched-only').forEach(el => el.classList.toggle('hidden', !isWatched));
    if (isWatched) onCategoryChange();
  }

  function onCategoryChange() {
    const cat = document.getElementById('selCategory').value;
    document.getElementById('boyField').classList.toggle('hidden',  cat === 'girl');
    document.getElementById('girlField').classList.toggle('hidden', cat === 'boy');
  }

  function saveMovie() {
    if (!pending) return;
    const btn = document.getElementById('btnSave');
    btn.disabled = true;

    const status   = document.getElementById('selStatus').value;
    const category = status === 'watched' ? document.getElementById('selCategory').value : 'watchlist';

    const movie = {
      id:        pending.id,
      title:     pending.title,
      overview:  pending.overview ?? 'Описание отсутствует.',
      poster:    pending._poster ?? (pending.poster_path ? `https://image.tmdb.org/t/p/w185${pending.poster_path}` : 'https://placehold.co/95x142/1a152e/9c94b0?text=?'),
      year:      pending.release_date?.substring(0,4) ?? '—',
      status,
      category,
      scoreBoy:  (status === 'watched' && category !== 'girl') ? parseInt(document.getElementById('sliBoy').value)  : null,
      scoreGirl: (status === 'watched' && category !== 'boy')  ? parseInt(document.getElementById('sliGirl').value) : null,
    };

    apiSave(movie);
    document.getElementById('configForm').classList.add('hidden');
    document.getElementById('searchInput').value = '';
    pending = null;
    btn.disabled = false;
  }

  function editRatings(id) {
    const movie = db.find(m => m.id === id);
    if (!movie) return;
    pending = { id: movie.id, title: movie.title, overview: movie.overview, _poster: movie.poster, year: movie.year };
    document.getElementById('searchInput').value = movie.title;
    document.getElementById('configTitle').textContent = `Изменить оценки: "${movie.title}"`;
    document.getElementById('selStatus').value   = movie.status;
    document.getElementById('selCategory').value = movie.category;
    document.getElementById('sliBoy').value      = movie.scoreBoy ?? 5;
    document.getElementById('sliGirl').value     = movie.scoreGirl ?? 5;
    document.getElementById('valBoy').textContent  = movie.scoreBoy ?? 5;
    document.getElementById('valGirl').textContent = movie.scoreGirl ?? 5;
    document.getElementById('btnSave').textContent = 'Сохранить изменения';
    document.getElementById('configForm').classList.remove('hidden');
    onStatusChange();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function deleteMovie(id) { apiDelete(id); }

  function markWatched(id) {
    const movie = db.find(m => m.id === id);
    if (!movie) return;
    pending = { id: movie.id, title: movie.title, overview: movie.overview, _poster: movie.poster, year: movie.year };
    document.getElementById('configTitle').textContent = `Посмотрели! "${movie.title}"`;
    document.getElementById('selStatus').value   = 'watched';
    document.getElementById('configForm').classList.remove('hidden');
    onStatusChange();
  }

  function switchTab(btn, tab) {
    activeTab = tab;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('subTabs').classList.toggle('hidden', tab !== 'watched');
    render();
  }

  /* Исправление бага клика по подвкладкам в Просмотрено */
  function switchSub(btn, sub) {
    activeSub = sub;
    document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const grid = document.getElementById('grid');
    let list = db.filter(m => m.status === activeTab);
    if (activeTab === 'watched' && activeSub !== 'all') list = list.filter(m => m.category === activeSub);
    if (!list.length) { grid.innerHTML = '<div class="empty">Здесь пока пусто 🎬</div>'; return; }

    grid.innerHTML = list.map(movie => {
      const tags = movie.status === 'watched' ? `
        <span class="tag tag-viewer">${LABELS[movie.category] ?? movie.category}</span>
        ${movie.scoreBoy  != null ? `<span class="tag tag-score">👨 ${movie.scoreBoy}/10</span>`  : ''}
        ${movie.scoreGirl != null ? `<span class="tag tag-score">👩 ${movie.scoreGirl}/10</span>` : ''}
      ` : '';
      const actions = movie.status === 'watchlist'
        ? `<button class="btn-action btn-watched" onclick="markWatched(${movie.id})">Посмотрели!</button><button class="btn-action btn-delete" onclick="deleteMovie(${movie.id})">Удалить</button>`
        : `<button class="btn-action btn-edit" onclick="editRatings(${movie.id})">Оценки</button><button class="btn-action btn-delete" onclick="deleteMovie(${movie.id})">Удалить</button>`;

      return `<article class="card"><img class="card-poster" src="${esc(movie.poster)}"><div class="card-body"><div class="card-title">${esc(movie.title)}</div><div class="card-year">${esc(movie.year)}</div><div class="card-desc">${esc(movie.overview)}</div><div class="card-tags">${tags}</div></div><div class="card-actions">${actions}</div></article>`;
    }).join('');
  }

  function esc(str) { return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) hideDropdown(); });
  
  function boot() { apiGet(); }
  boot();
</script>
</body>
</html>
