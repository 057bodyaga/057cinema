<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Киношке</title>
  <style>
    :root {
      --bg:         #09070f;
      --panel:      #130f22;
      --card:       #1a152e;
      --border:     #2c224d;
      --text:       #f1edf7;
      --muted:      #9c94b0;
      --accent:     #9d4edd;
      --accent-glow:rgba(157, 78, 221, 0.35);
      --accent2:    #f72585;
      --danger:     #ff5252;
      --success:    #2ecc71;
      --star:       #ffbe0b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }

    /* ── Layout ─────────────────────────────────────── */
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 16px 80px;
    }

    /* ── Header ─────────────────────────────────────── */
    .site-title {
      text-align: center;
      font-size: 2.6rem;
      font-weight: 800;
      margin-bottom: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: none;
    }

    /* ── Search / Add panel ──────────────────────────── */
    .add-panel {
      background: linear-gradient(135deg, var(--panel), #17122b);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.45);
      position: relative;
    }

    .search-wrap { position: relative; }

    input[type="text"] {
      width: 100%;
      padding: 14px 18px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color .25s, box-shadow .25s;
    }
    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 14px var(--accent-glow);
    }

    /* ── Dropdown results ────────────────────────────── */
    .dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-height: 320px;
      overflow-y: auto;
      z-index: 200;
      box-shadow: 0 16px 40px rgba(0,0,0,0.65);
    }
    .dropdown-item {
      display: flex;
      gap: 14px;
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .15s;
    }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item:hover { background: rgba(157,78,221,.12); }
    .dropdown-item img { width: 42px; height: 62px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
    .dropdown-item h4 { font-size: .95rem; margin-bottom: 4px; }
    .dropdown-item p  { font-size: .82rem; color: var(--muted); }

    /* ── Config form (shown after selecting a movie) ─── */
    .config-form {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-top: 16px;
    }
    .config-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 16px; color: var(--text); }

    .row { display: flex; gap: 18px; margin-bottom: 14px; flex-wrap: wrap; }
    .field { flex: 1; min-width: 190px; }
    .field label { display: block; font-size: .85rem; color: var(--muted); margin-bottom: 7px; }

    select {
      width: 100%;
      padding: 11px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      outline: none;
      cursor: pointer;
    }

    .slider-row { display: flex; align-items: center; gap: 10px; }
    input[type="range"] { flex: 1; accent-color: var(--accent); }
    .score-val { font-weight: 700; color: var(--star); min-width: 32px; }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: linear-gradient(45deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s;
      margin-top: 4px;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-primary:disabled { opacity: .45; cursor: default; }
